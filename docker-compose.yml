services:
  taxbot:
    build: .
    container_name: taxbot
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - TOKENIZERS_PARALLELISM=false
    volumes:
      - hf-cache:/home/app/.cache  # cache HuggingFace model
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # --- Add more bots below ---
  # myotherbot:
  #   build: ../other-bot
  #   container_name: myotherbot
  #   restart: unless-stopped
  #   env_file:
  #     - ../other-bot/.env

volumes:
  hf-cache:
